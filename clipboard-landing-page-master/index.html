<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />

    <title>ClipBoarrd-Landing-page</title>
  </head>
  <body>
    <div id="root">
      <section id="hero_section" class="continer">
        <img src="./images/logo.svg" alt="logo clipboard" class="logo" />

        <div class="hero-content">
          <h1 class="base-heading">A history of everything you copy</h1>
          <p class="description">
            Clipboard allows you to track and orgainze everything you copy.

          </p>

          <div class="controls-buttons">

              Download for iOS
            </button>
            <button id="cta-download_Mac" class="cta-button">
              Download for Mac
            </button>
          </div>
        </div>
      </section>
    </div>
