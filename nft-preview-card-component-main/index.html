<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image.png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="style.css" />

    <title>NFT-Preview-card</title>
  </head>
  <body>
    <article class="preview">
      <img
        src="./images/image-equilibrium.jpg"
        alt="image"
        class="cube-equilibrium"
      />

      <header>
        <h1 class="hearder-text">Equilibrium #3429</h1>
      </header>
      <p class="content">
        Our Equilibrium collection promotes balance and calm.
      </p>

      <div class="icon-subline">
        <img
          src="./images/icon-ethereum.svg"
          alt="iconimages"
          class="small-icon"
        />

        <span class="code-word">0.041 ETH</span>
      </div>

      <div>
        <img src="./images/icon-clock.svg" alt="iconclock" class="clock-icon" />

        <span class="days"> 3 days left </span>
      </div>

      <footer>
        <img src="images/image-avatar.png" alt="avatar" class="boy-avator" />

        <span class="author">Creation of Jules Wyvern</span>
      </footer>
    </article>
  </body>
</html>
